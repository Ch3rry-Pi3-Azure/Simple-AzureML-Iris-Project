# ================================================================
# Azure ML Command Component: Iris Train Model
#
# This command component runs the training stage of the project's
# Azure ML pipeline. It performs the following tasks:
#
#   1. recreates the deterministic train/test split
#   2. runs GridSearchCV for the Random Forest model
#   3. evaluates the best estimator on the held-out test split
#   4. saves the best model in MLflow format
#   5. writes metrics, reports, and plots to an output folder
#
# The component is registered as an Azure ML component asset and is
# then referenced from the pipeline job YAML using:
#
#   azureml:iris_train_model@latest
# ================================================================

$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json
type: command

# Component identity shown in Azure ML Studio
name: iris_train_model
display_name: Iris Train Model

# ------------------------------------------------
# Inputs
# ------------------------------------------------
inputs:
  # Random seed used by the model and search process
  model_random_state:
    type: integer
    default: 5901

  # Fraction of data reserved for the held-out test split
  test_size:
    type: number
    default: 0.2

  # Random seed controlling the train/test data split
  data_random_state:
    type: integer
    default: 5901

# ------------------------------------------------
# Outputs
# ------------------------------------------------
outputs:
  # MLflow model folder produced by the best estimator
  model_output:
    type: mlflow_model

  # Directory containing metrics, reports, and plots
  metrics_output:
    type: uri_folder

# ------------------------------------------------
# Code and Environment
# ------------------------------------------------

# Source folder uploaded for component execution
code: ../../src

environment:
  # Base Azure ML image for component execution
  image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu20.04

  # Conda specification containing runtime dependencies
  conda_file: ../conda.yml

# ------------------------------------------------
# Command
# ------------------------------------------------
# The component entry point is `pipeline_train.py` located in the
# `src/` directory referenced above.
command: >-
  python pipeline_train.py
  --model-output ${{outputs.model_output}}
  --metrics-output ${{outputs.metrics_output}}
  --model-random-state ${{inputs.model_random_state}}
  --test-size ${{inputs.test_size}}
  --data-random-state ${{inputs.data_random_state}}
