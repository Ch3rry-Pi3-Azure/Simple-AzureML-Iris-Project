# ================================================================
# Continuous Integration Workflow for the Iris Azure ML Project
#
# This workflow runs automated checks whenever code is pushed to
# the main branch or when a pull request targeting main is opened.
#
# The workflow performs the following steps:
#
#   1. checks out the repository
#   2. sets up Python
#   3. installs project dependencies
#   4. sets the project root on the Python path
#   5. verifies the source tree compiles
#   6. runs the test suite
#
# This provides a basic CI safety net so that small issues are
# caught automatically before or after code is merged.
# ================================================================

name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    # Use the latest Ubuntu runner provided by GitHub Actions
    runs-on: ubuntu-latest

    # Expose the repository root to Python so imports such as
    # `from src.core.data import load_data` work correctly in tests
    env:
      PYTHONPATH: .

    steps:
      # Check out the repository contents so the workflow can access code
      - name: Check out repository
        uses: actions/checkout@v4

      # Set up the required Python version
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Install project dependencies
      #   - requirements.txt contains the main runtime packages
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      # Ensure the source tree is syntactically valid before tests run
      - name: Compile source tree
        run: |
          python -m compileall src tests

      # Run the automated test suite
      - name: Run tests
        run: |
          pytest
